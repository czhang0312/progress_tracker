default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  host: localhost
  port: 5432

development:
  <<: *default
  database: progress_tracker_development

test:
  <<: *default
  database: progress_tracker_test

production:
  <<: *default
  database: your_app_name_production
  username: your_app_name
  password: <%= ENV["YOUR_APP_NAME_DATABASE_PASSWORD"] %>