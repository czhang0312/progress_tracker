default: &default
  adapter: postgresql
  url: <%= ENV['DATABASE_URL'] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000


production:
  <<: *default

development:
  <<: *default
  database: progress_tracker_development

test:
  <<: *default
  database: progress_tracker_test

cable:
  <<: *default

queue:
  <<: *default

cache:
  <<: *default